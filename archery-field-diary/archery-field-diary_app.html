<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archery Field Diary - 정책 문서</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 2em;
        }
        
        .app-subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1em;
        }
        
        .policy-section {
            margin-top: 30px;
        }
        
        .policy-section h2 {
            color: #34495e;
            margin-bottom: 20px;
            font-size: 1.5em;
            padding-left: 10px;
            border-left: 4px solid #3498db;
        }
        
        .policy-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .policy-link {
            display: block;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
            border: 2px solid transparent;
        }
        
        .policy-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            background: #e9ecef;
            border-color: #667eea;
        }
        
        .policy-link-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .policy-link:hover .policy-link-title {
            color: #764ba2;
        }
        
        .policy-link-description {
            color: #666;
            font-size: 0.9em;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
            text-align: center;
            width: 100%;
        }
        
        .back-link:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Archery Field Diary</h1>
        <p class="app-subtitle" style="font-weight: 600; color: #667eea;">습사일지</p>
        <p class="app-subtitle">궁도 훈련 기록 및 분석을 위한 습사일지 앱</p>
        
        <div class="policy-section">
            <h2>정책 문서</h2>
            <div class="policy-links">
                <a href="archeryfielddiary-privacy-policy.html" class="policy-link">
                    <div class="policy-link-title">🔒 개인정보처리방침</div>
                    <div class="policy-link-description">습사일지 앱의 개인정보 수집 및 이용에 대한 안내</div>
                </a>
                
                <a href="archeryfielddiary-terms-of-service.html" class="policy-link">
                    <div class="policy-link-title">📋 이용약관</div>
                    <div class="policy-link-description">습사일지 앱 이용약관 및 서비스 이용 규정</div>
                </a>
            </div>
        </div>
        
        <a href="/" class="back-link">← 홈으로 돌아가기</a>
    </div>
</body>
</html>
